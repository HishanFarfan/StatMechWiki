<svg viewBox="0 0 500 275" xmlns="http://www.w3.org/2000/svg"
     style="font-family:sans-serif">

  <!-- fondos de region -->
  <rect x="70" y="50" width="190" height="190" fill="#16a34a" opacity="0.08"/>
  <rect x="260" y="50" width="190" height="190" fill="#dc2626" opacity="0.08"/>

  <!-- separador en el pico -->
  <line x1="260" y1="50" x2="260" y2="240"
        stroke="#aaa" stroke-width="1" stroke-dasharray="4,4"/>

  <!-- curva: entropia binaria S(x) = -x ln x - (1-x) ln(1-x) / ln2, x = E/Ne -->
  <polyline
    points="70,240 78,213 89,185 108,151 146,103 184,73 222,56 260,50
            298,56 336,73 374,103 412,151 431,185 442,213 450,240"
    fill="none" stroke="#2563eb" stroke-width="2.5"
    stroke-linejoin="round" stroke-linecap="round"/>

  <!-- eje X -->
  <line x1="60" y1="240" x2="462" y2="240" stroke="#444" stroke-width="1.5"/>
  <polygon points="462,236 462,244 470,240" fill="#444"/>

  <!-- eje Y -->
  <line x1="70" y1="250" x2="70" y2="22" stroke="#444" stroke-width="1.5"/>
  <polygon points="66,22 74,22 70,14" fill="#444"/>

  <!-- etiquetas de ejes -->
  <text x="472" y="244" font-size="14" fill="#444" font-style="italic">E</text>
  <text x="76" y="16" font-size="14" fill="#444" font-style="italic">S</text>

  <!-- marcas eje X -->
  <line x1="70" y1="238" x2="70" y2="242" stroke="#555"/>
  <text x="60" y="258" font-size="11" fill="#666">0</text>

  <line x1="260" y1="238" x2="260" y2="242" stroke="#555"/>
  <text x="238" y="258" font-size="11" fill="#666">N&#x03B5;/2</text>

  <line x1="450" y1="238" x2="450" y2="242" stroke="#555"/>
  <text x="437" y="258" font-size="11" fill="#666">N&#x03B5;</text>

  <!-- marca eje Y -->
  <line x1="68" y1="50" x2="72" y2="50" stroke="#555"/>
  <text x="4" y="54" font-size="10" fill="#666">Nk_B ln 2</text>

  <!-- tangente T > 0 en x=0.2 (svg 146,103), pendiente -1.0 en coords SVG -->
  <line x1="96" y1="153" x2="196" y2="53"
        stroke="#16a34a" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.9"/>
  <text x="72" y="193" font-size="13" fill="#16a34a" font-weight="bold">T &gt; 0</text>
  <text x="72" y="208" font-size="10" fill="#16a34a">&#x2202;S/&#x2202;E &gt; 0</text>

  <!-- tangente T → ±∞ en el pico (260,50), horizontal -->
  <line x1="210" y1="50" x2="310" y2="50"
        stroke="#d97706" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.9"/>
  <text x="207" y="40" font-size="10.5" fill="#d97706" font-weight="bold">T &#x2192; &#xB1;&#x221E;</text>
  <text x="213" y="29" font-size="9.5" fill="#d97706">&#x2202;S/&#x2202;E = 0</text>

  <!-- tangente T < 0 en x=0.8 (svg 374,103), pendiente +1.0 en coords SVG -->
  <line x1="324" y1="53" x2="424" y2="153"
        stroke="#dc2626" stroke-width="1.5" stroke-dasharray="5,4" opacity="0.9"/>
  <text x="390" y="193" font-size="13" fill="#dc2626" font-weight="bold">T &lt; 0</text>
  <text x="386" y="208" font-size="10" fill="#dc2626">&#x2202;S/&#x2202;E &lt; 0</text>

  <!-- ecuacion clave -->
  <text x="150" y="230" font-size="11" fill="#888" font-style="italic">
    1/T = (&#x2202;S/&#x2202;E)
    <tspan dy="3" font-size="8">V,N</tspan>
  </text>

</svg>
